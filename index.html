<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Research Recommender</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0eeea; --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.13); --text: #1a1a2e; --muted: #8a8fa8; --accent: #4f6ef7;
    --accent2: #7c5cbf; --local: #0d9f6e; --arxiv: #d97706; --semantic: #2563eb;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(79,110,247,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(79,110,247,0.05) 1px, transparent 1px); background-size: 40px 40px;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
  header { padding: 64px 0 48px; text-align: center; }
  .logo { display: inline-flex; align-items: center; gap: 10px; font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 32px; }
  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 52px); font-weight: 400; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 16px; background: linear-gradient(135deg, #1a1a2e 0%, #4f6ef7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { font-size: 15px; color: var(--muted); font-weight: 300; letter-spacing: 0.01em; }
  .search-wrapper { margin: 40px 0 48px; position: relative; }
  .search-box { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 6px 6px 6px 20px; gap: 12px; transition: border-color 0.2s, box-shadow 0.2s; }
  .search-box:focus-within { border-color: rgba(91,138,240,0.5); box-shadow: 0 0 0 3px rgba(91,138,240,0.1); }
  .search-icon { color: var(--muted); font-size: 18px; flex-shrink: 0; }
  #query { flex: 1; background: none; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--text); padding: 10px 0; }
  #query::placeholder { color: var(--muted); }
  .search-btn { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 12px 24px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s, transform 0.15s; white-space: nowrap; flex-shrink: 0; }
  .search-btn:hover { opacity: 0.88; } .search-btn:active { transform: scale(0.97); } .search-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .options-row { display: flex; align-items: center; gap: 16px; margin-top: 14px; padding: 0 4px; }
  .options-label { font-size: 13px; color: var(--muted); }
  .topk-pills { display: flex; gap: 6px; }
  .pill { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .pill.active, .pill:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sources-row { display: flex; gap: 20px; margin-top: 10px; padding: 0 4px; flex-wrap: wrap; }
  .source-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .source-dot { width: 8px; height: 8px; border-radius: 50%; }
  #status { text-align: center; padding: 64px 0; color: var(--muted); font-size: 15px; display: none; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #results { padding-bottom: 80px; }
  .results-meta { font-size: 13px; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 24px; margin-bottom: 12px; transition: border-color 0.2s, background 0.2s; animation: fadeUp 0.3s ease both; }
  .card:hover { border-color: rgba(79,110,247,0.25); background: var(--surface2); box-shadow: 0 4px 20px rgba(79,110,247,0.06); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 400; line-height: 1.4; color: var(--text); }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-top: 2px; }
  .source-tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.04em; text-transform: uppercase; }
  .tag-local { background: rgba(52,211,153,0.12); color: var(--local); }
  .tag-arxiv { background: rgba(245,158,11,0.12); color: var(--arxiv); }
  .tag-semantic { background: rgba(96,165,250,0.12); color: var(--semantic); }
  .score-badge { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .card-abstract { font-size: 14px; color: var(--muted); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card-info { display: flex; gap: 16px; }
  .info-item { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .card-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif; text-decoration: none; cursor: pointer; transition: all 0.15s; }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,138,240,0.06); }
  .link-btn.primary { border-color: var(--accent); color: var(--accent); }
  .empty { text-align: center; padding: 80px 0; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><div class="logo-dot"></div>Research Intelligence<div class="logo-dot"></div></div>
    <h1>Find the papers<br>that matter</h1>
    <p class="subtitle">Semantic search across local database &amp; live sources</p>
  </header>

  <div class="search-wrapper">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="query" placeholder="e.g. deep learning for medical image segmentation…" autocomplete="off" />
      <button class="search-btn" id="searchBtn" onclick="search()">Search</button>
    </div>
    <div class="options-row">
      <span class="options-label">Results per source:</span>
      <div class="topk-pills">
        <button class="pill" onclick="setTopK(3)">3</button>
        <button class="pill active" onclick="setTopK(5)">5</button>
        <button class="pill" onclick="setTopK(10)">10</button>
      </div>
    </div>
    <div class="sources-row">
      <div class="source-badge"><div class="source-dot" style="background:var(--local)"></div>Local DB (DBLP)</div>
      <div class="source-badge"><div class="source-dot" style="background:var(--arxiv)"></div>ArXiv (live)</div>
      <div class="source-badge"><div class="source-dot" style="background:var(--semantic)"></div>Semantic Scholar (live)</div>
    </div>
  </div>

  <div id="status"><div class="spinner"></div>Searching across all sources…</div>
  <div id="results"></div>
</div>

<script>
let topK = 5;
let currentAbstracts = [];

function setTopK(n) {
  topK = n;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
}

document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function fetchSemanticScholar(query, k) {
  try {
    const url = `https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(query)}&limit=${k}&fields=title,abstract,year,citationCount,externalIds,openAccessPdf`;
    const res = await fetch(url);
    const data = await res.json();
    return (data.data || []).map(p => ({
      title: p.title || 'Untitled', abstract: p.abstract || '', year: p.year || '', n_citation: p.citationCount || 0,
      link: p.openAccessPdf?.url || (p.externalIds?.DOI ? `https://doi.org/${p.externalIds.DOI}` : null), source: 'Semantic Scholar'
    }));
  } catch { return []; }
}

async function search() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  const status = document.getElementById('status');
  const resultsDiv = document.getElementById('results');

  btn.disabled = true; status.style.display = 'block'; resultsDiv.innerHTML = '';

  try {
    const [localRes, semanticRes] = await Promise.all([
      fetch('http://127.0.0.1:8000/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, top_k: topK })
      }).then(r => r.json()).catch(() => ({ local_results: [], arxiv_results: [] })),
      fetchSemanticScholar(query, topK)
    ]);

    const local = (localRes.local_results || []).map(p => ({ ...p, source: 'Local DB' }));
    const arxiv = (localRes.arxiv_results || []).map(p => ({ ...p, source: 'ArXiv' }));
    const all = [...local, ...arxiv, ...semanticRes];
    
    const seen = new Set();
    const unique = all.filter(p => {
      const key = p.title.toLowerCase().slice(0, 60);
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });

    unique.sort((a, b) => {
      if (a.score && b.score) return b.score - a.score;
      if (a.score) return -1; if (b.score) return 1;
      return (b.year || 0) - (a.year || 0);
    });

    status.style.display = 'none';
    currentAbstracts = unique.map(p => p.abstract || '');
    renderResults(unique, query);
  } catch (err) {
    status.style.display = 'none';
    resultsDiv.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><p>Error connecting to backend.</p></div>`;
  }
  btn.disabled = false;
}

async function summarizeAbstract(index) {
  const summaryDiv = document.getElementById(`summary-${index}`);
  const btn = document.getElementById(`sum-btn-${index}`);
  const abstractText = currentAbstracts[index];
  
  if (!abstractText) {
    summaryDiv.innerHTML = "<p style='color:red; font-size:12px;'>No abstract available.</p>";
    summaryDiv.style.display = "block"; return;
  }

  if (summaryDiv.style.display === "block" && summaryDiv.innerHTML !== "") {
    summaryDiv.style.display = "none"; return;
  }

  summaryDiv.innerHTML = "<div class='spinner' style='width:16px; height:16px; margin:5px 0; display:inline-block; vertical-align:middle;'></div> <span style='font-size:12px; color:var(--muted);'>Calling Llama 3...</span>";
  summaryDiv.style.display = "block";
  btn.disabled = true;

  try {
    // إرسال كـ URL parameter آمن لتخطي قيود الـ Pre-flight JSON CORS تماماً
    const res = await fetch(`http://127.0.0.1:8000/summarize?abstract=${encodeURIComponent(abstractText)}`, {
      method: 'POST'
    });
    const data = await res.json();
    
    summaryDiv.innerHTML = `<div style="background: var(--surface2); padding: 14px; border-radius: 10px; margin-top: 12px; border-left: 4px solid var(--accent2); font-size: 13px; color: var(--text); line-height: 1.5;">
      <strong style="color:var(--accent2);">✨ Llama 3 Insights:</strong><br><span style="display:block; margin-top:6px;">${data.summary.replace(/\n/g, '<br>')}</span>
    </div>`;
  } catch {
    summaryDiv.innerHTML = "<p style='color:red; font-size:12px;'>Failed to connect to Llama 3 server.</p>";
  }
  btn.disabled = false;
}

function makeSearchLinks(title) {
  const q = encodeURIComponent(title);
  return [
    { label: 'Google Scholar', url: `https://scholar.google.com/scholar?q=${q}` },
    { label: 'ArXiv', url: `https://arxiv.org/search/?query=${q}&searchtype=all` },
    { label: 'Semantic Scholar', url: `https://www.semanticscholar.org/search?q=${q}` },
    { label: 'ResearchGate', url: `https://www.researchgate.net/search?q=${q}` },
    { label: 'IEEE', url: `https://ieeexplore.ieee.org/search/searchresult.jsp?queryText=${q}` },
    { label: 'PubMed', url: `https://pubmed.ncbi.nlm.nih.gov/?term=${q}` }
  ];
}

function tagClass(source) {
  if (source === 'Local DB') return 'tag-local';
  if (source === 'ArXiv') return 'tag-arxiv';
  return 'tag-semantic';
}

function renderResults(papers, query) {
  const resultsDiv = document.getElementById('results');
  if (!papers.length) {
    resultsDiv.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><p>No results found.</p></div>`; return;
  }

  let html = `<div class="results-meta"><span class="results-count">${papers.length} papers found</span><span>${new Date().toLocaleTimeString()}</span></div>`;

  papers.forEach((p, i) => {
    const links = makeSearchLinks(p.title);
    const primaryLink = p.link || links[0].url;
    const scoreStr = p.score ? `${(p.score * 100).toFixed(0)}% match` : '';
    const yearStr = p.year ? `${p.year}` : '';
    const citStr = p.n_citation != null && p.n_citation > 0 ? `${p.n_citation.toLocaleString()} citations` : '';
    const searchLinks = links.map(l => `<a class="link-btn" href="${l.url}" target="_blank">${l.label}</a>`).join('');

    html += `
    <div class="card" style="animation-delay:${i * 40}ms">
      <div class="card-top">
        <a href="${primaryLink}" target="_blank" class="card-title" style="text-decoration:none;">${p.title}</a>
        <div class="card-meta">
          <span class="source-tag ${tagClass(p.source)}">${p.source}</span>
          ${scoreStr ? `<span class="score-badge">${scoreStr}</span>` : ''}
        </div>
      </div>
      ${p.abstract ? `<p class="card-abstract">${p.abstract}</p>` : ''}
      
      <div id="summary-${i}" style="display:none; margin: 10px 0 0 0;"></div>

      <div class="card-footer">
        <div class="card-info">
          ${yearStr ? `<span class="info-item">📅 ${yearStr}</span>` : ''}
          ${citStr ? `<span class="info-item">📊 ${citStr}</span>` : ''}
        </div>
        <div class="card-links">
          <button class="link-btn" id="sum-btn-${i}" style="background: rgba(124,92,191,0.08); color: var(--accent2); border-color: rgba(124,92,191,0.25);" onclick="summarizeAbstract(${i})">⚡ Summarize (Llama 3)</button>
          ${p.link ? `<a class="link-btn primary" href="${p.link}" target="_blank">Full paper ↗</a>` : ''}
          ${searchLinks}
        </div>
      </div>
    </div>`;
  });
  resultsDiv.innerHTML = html;
}
</script>
</body>
</html>
